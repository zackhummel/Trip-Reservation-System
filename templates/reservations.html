{% extends "base.html" %}

{% block content %}
    <h1>{% block title %}All Reservations {% endblock %}</h1>
    
    {% for reservation in reservations %}
        <div class="post">
            <p><strong>Reservation ID: </strong> {{ reservation['passengerName'], reservation['seatRow'], 
                reservation['seatColumn'], reservation['eTicketNumber'] }}</p>
            
            
        </div>
    {% endfor %}

{% endblock %}
